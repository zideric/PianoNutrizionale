<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Nutrizionale - Eric e Chiara</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

:root {
  --font-family-base: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-lg: 16px;
  --font-size-xl: 18px;
  --font-size-2xl: 22px;
  --font-size-3xl: 28px;
  --space-2: 2px;
  --space-4: 4px;
  --space-6: 6px;
  --space-8: 8px;
  --space-12: 12px;
  --space-16: 16px;
  --space-20: 20px;
  --space-24: 24px;
  --space-32: 32px;
  --space-40: 40px;
  --space-48: 48px;
  --radius-sm: 8px;
  --radius-base: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 999px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.1), 0 4px 8px rgba(0,0,0,0.05);
}

.light-theme {
  --color-background: #f5f3ef;
  --color-surface: #ffffff;
  --color-surface-alt: #f0ede8;
  --color-surface-hover: #faf8f5;
  --color-text: #1c1b1f;
  --color-text-secondary: #605d6b;
  --color-text-muted: #9994a8;
  --color-primary: #2e7d5e;
  --color-primary-hover: #1f5f46;
  --color-primary-light: rgba(46,125,94,0.1);
  --color-border: #e5e2da;
  --color-border-subtle: #eeebe4;
  --colazione-bg: #fffbeb;
  --colazione-border: #f59e0b;
  --colazione-title: #92400e;
  --pranzo-bg: #f0fdf4;
  --pranzo-border: #22c55e;
  --pranzo-title: #14532d;
  --cena-bg: #eff6ff;
  --cena-border: #3b82f6;
  --cena-title: #1e3a8a;
  --eric-color: #1d6eb8;
  --eric-bg: rgba(29,110,184,0.06);
  --eric-border: rgba(29,110,184,0.25);
  --chiara-color: #be185d;
  --chiara-bg: rgba(190,24,93,0.05);
  --chiara-border: rgba(190,24,93,0.25);
  --header-bg: linear-gradient(135deg, #1a4731 0%, #2e7d5e 60%, #3d9970 100%);
  --header-text: rgba(255,255,255,0.95);
  --header-subtext: rgba(255,255,255,0.7);
}

.dark-theme {
  --color-background: #0e1117;
  --color-surface: #161b27;
  --color-surface-alt: #1e2435;
  --color-surface-hover: #1a2030;
  --color-text: #e8e6f0;
  --color-text-secondary: #9490a4;
  --color-text-muted: #635f73;
  --color-primary: #4ecaa0;
  --color-primary-hover: #3db88e;
  --color-primary-light: rgba(78,202,160,0.12);
  --color-border: #252b3b;
  --color-border-subtle: #1e2435;
  --colazione-bg: rgba(251,191,36,0.08);
  --colazione-border: #fbbf24;
  --colazione-title: #fcd34d;
  --pranzo-bg: rgba(78,202,160,0.08);
  --pranzo-border: #4ecaa0;
  --pranzo-title: #6ee7be;
  --cena-bg: rgba(99,132,235,0.08);
  --cena-border: #6384eb;
  --cena-title: #93a8f4;
  --eric-color: #60a5fa;
  --eric-bg: rgba(96,165,250,0.1);
  --eric-border: rgba(96,165,250,0.25);
  --chiara-color: #f472b6;
  --chiara-bg: rgba(244,114,182,0.08);
  --chiara-border: rgba(244,114,182,0.25);
  --header-bg: linear-gradient(135deg, #0a1a14 0%, #0f2618 60%, #132e20 100%);
  --header-text: rgba(255,255,255,0.95);
  --header-subtext: rgba(255,255,255,0.55);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 0;
  font-family: var(--font-family-base);
  background: var(--color-background);
  color: var(--color-text);
  font-size: var(--font-size-base);
  transition: background 0.3s, color 0.3s;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 var(--space-16) var(--space-40);
}

/* HEADER */
.header {
  background: var(--header-bg);
  padding: var(--space-32) var(--space-24) var(--space-40);
  margin-bottom: var(--space-32);
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 220px; height: 220px;
  background: rgba(255,255,255,0.04);
  border-radius: 50%;
  pointer-events: none;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -70px; left: -40px;
  width: 280px; height: 280px;
  background: rgba(255,255,255,0.03);
  border-radius: 50%;
  pointer-events: none;
}
.header-emoji {
  font-size: 40px;
  display: block;
  margin-bottom: var(--space-8);
}
.header h1 {
  font-size: var(--font-size-3xl);
  font-weight: 800;
  margin: 0 0 var(--space-4);
  color: var(--header-text);
  letter-spacing: -0.5px;
}
.header h2 {
  font-size: var(--font-size-lg);
  font-weight: 400;
  margin: 0;
  color: var(--header-subtext);
  letter-spacing: 0.5px;
}
.theme-switcher {
  position: absolute;
  top: var(--space-16);
  right: var(--space-16);
}
#theme-toggle {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.2);
  font-size: 18px;
  cursor: pointer;
  color: white;
  width: 40px;
  height: 40px;
  border-radius: var(--radius-full);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  padding: 0;
}
#theme-toggle:hover { background: rgba(255,255,255,0.25); }

/* NAVIGATION */
.nav-buttons {
  display: flex;
  gap: var(--space-6);
  margin-bottom: var(--space-24);
  background: var(--color-surface);
  padding: var(--space-6);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-border);
}
.nav-btn {
  flex: 1;
  padding: var(--space-12) var(--space-16);
  background: transparent;
  border: none;
  border-radius: var(--radius-lg);
  font-size: var(--font-size-sm);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  color: var(--color-text-secondary);
  font-family: var(--font-family-base);
}
.nav-btn:hover {
  background: var(--color-surface-alt);
  color: var(--color-text);
}
.nav-btn.active {
  background: var(--color-primary);
  color: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* DAY SELECTOR */
.day-selector {
  display: flex;
  gap: var(--space-6);
  margin-bottom: var(--space-20);
  flex-wrap: wrap;
}
.day-btn {
  flex: 1;
  min-width: 72px;
  padding: var(--space-8) var(--space-12);
  background: var(--color-surface);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-full);
  cursor: pointer;
  font-size: var(--font-size-sm);
  font-weight: 500;
  color: var(--color-text-secondary);
  transition: all 0.2s ease;
  white-space: nowrap;
  font-family: var(--font-family-base);
}
.day-btn:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  background: var(--color-primary-light);
}
.day-btn.active {
  background: var(--color-primary);
  color: white;
  border-color: var(--color-primary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

/* PERSON TOGGLE */
.person-toggle {
  display: flex;
  gap: var(--space-8);
  margin-bottom: var(--space-24);
}
.person-btn {
  flex: 1;
  padding: var(--space-12) var(--space-16);
  background: var(--color-surface);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  font-weight: 600;
  font-size: var(--font-size-base);
  color: var(--color-text-secondary);
  transition: all 0.2s ease;
  font-family: var(--font-family-base);
}
.person-btn:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
}
.person-btn.active {
  background: var(--color-primary);
  color: white;
  border-color: var(--color-primary);
  box-shadow: var(--shadow-md);
}

/* MEALS */
.meals-grid {
  display: grid;
  gap: var(--space-16);
}
.meal-card {
  background: var(--color-surface);
  border-radius: var(--radius-xl);
  padding: var(--space-20) var(--space-24);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-sm);
}
.meal-card.colazione {
  background: var(--colazione-bg);
  border-left: 4px solid var(--colazione-border);
}
.meal-card.pranzo {
  background: var(--pranzo-bg);
  border-left: 4px solid var(--pranzo-border);
}
.meal-card.cena {
  background: var(--cena-bg);
  border-left: 4px solid var(--cena-border);
}
.meal-header {
  display: flex;
  align-items: center;
  gap: var(--space-8);
  margin-bottom: var(--space-12);
}
.meal-icon { font-size: 20px; }
.meal-title {
  font-size: var(--font-size-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin: 0;
}
.meal-card.colazione .meal-title { color: var(--colazione-title); }
.meal-card.pranzo .meal-title { color: var(--pranzo-title); }
.meal-card.cena .meal-title { color: var(--cena-title); }
.meal-name {
  font-size: var(--font-size-lg);
  font-weight: 700;
  margin: 0 0 var(--space-12);
  color: var(--color-text);
  line-height: 1.3;
}
.meal-nota {
  font-style: italic;
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  margin-bottom: var(--space-16);
  padding: var(--space-8) var(--space-12);
  background: rgba(0,0,0,0.03);
  border-radius: var(--radius-sm);
}
.dark-theme .meal-nota { background: rgba(255,255,255,0.04); }
.meal-subtitle {
  font-weight: 600;
  font-size: var(--font-size-sm);
  margin-bottom: var(--space-8);
  color: var(--color-text);
}
.section-title {
  font-weight: 700;
  font-size: var(--font-size-xs);
  margin: var(--space-16) 0 var(--space-8);
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--color-text-muted);
}
ul { margin: 0; padding-left: var(--space-20); }
li { margin-bottom: var(--space-6); line-height: 1.6; }
.hidden { display: none; }

/* PERSON CARDS */
.two-column-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-12);
}
@media (max-width: 768px) {
  .two-column-layout { grid-template-columns: 1fr; }
}
.person-card {
  border-radius: var(--radius-lg);
  padding: var(--space-16);
  border: 1.5px solid var(--color-border);
}
.person-card.eric {
  background: var(--eric-bg);
  border-color: var(--eric-border);
}
.person-card.chiara {
  background: var(--chiara-bg);
  border-color: var(--chiara-border);
}
.person-name {
  font-size: var(--font-size-sm);
  font-weight: 700;
  margin-bottom: var(--space-8);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.person-card.eric .person-name { color: var(--eric-color); }
.person-card.chiara .person-name { color: var(--chiara-color); }

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  padding: var(--space-4) var(--space-12);
  border-radius: var(--radius-full);
  font-size: var(--font-size-xs);
  font-weight: 700;
  margin-bottom: var(--space-12);
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.badge-warning {
  background: rgba(245,158,11,0.12);
  color: #92400e;
  border: 1px solid rgba(245,158,11,0.3);
}
.dark-theme .badge-warning {
  color: #fcd34d;
  background: rgba(251,191,36,0.15);
  border-color: rgba(251,191,36,0.3);
}
.badge-success {
  background: rgba(34,197,94,0.1);
  color: #14532d;
  border: 1px solid rgba(34,197,94,0.3);
}
.dark-theme .badge-success {
  color: #6ee7b7;
  background: rgba(78,202,160,0.15);
  border-color: rgba(78,202,160,0.3);
}

/* TABLE */
.table-title {
  font-size: var(--font-size-2xl);
  font-weight: 700;
  margin: 0 0 var(--space-20);
}
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--color-border);
}
th, td {
  border-bottom: 1px solid var(--color-border);
  border-right: 1px solid var(--color-border);
  padding: var(--space-12) var(--space-16);
  text-align: left;
  font-size: var(--font-size-sm);
  vertical-align: top;
}
th:last-child, td:last-child { border-right: none; }
tbody tr:last-child td { border-bottom: none; }
th {
  background: var(--color-primary);
  color: white;
  font-weight: 700;
  font-size: var(--font-size-xs);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
tbody tr:hover td { background: var(--color-surface-hover); }
.table-badge {
  display: inline-block;
  background: rgba(245,158,11,0.2);
  padding: 1px 6px;
  border-radius: var(--radius-full);
  font-size: 10px;
  font-weight: 600;
  margin-left: 4px;
  vertical-align: middle;
}

/* RECIPES */
.recipes-title {
  font-size: var(--font-size-2xl);
  font-weight: 700;
  margin: 0 0 var(--space-20);
}
.season-tabs {
  display: inline-flex;
  gap: var(--space-4);
  margin-bottom: var(--space-16);
  padding: var(--space-4);
  background: var(--color-surface);
  border-radius: var(--radius-full);
  border: 1px solid var(--color-border);
}
.season-tab {
  padding: var(--space-6) var(--space-16);
  border-radius: var(--radius-full);
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: var(--font-size-sm);
  font-weight: 600;
  color: var(--color-text-secondary);
  transition: all 0.2s;
  font-family: var(--font-family-base);
}
.season-tab.active {
  background: var(--color-primary);
  color: white;
}
.search-wrapper {
  position: relative;
  margin-bottom: var(--space-16);
}
.search-icon {
  position: absolute;
  left: var(--space-16);
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: var(--space-12) var(--space-16) var(--space-12) 44px;
  background: var(--color-surface);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-lg);
  font-size: var(--font-size-base);
  color: var(--color-text);
  font-family: var(--font-family-base);
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.search-input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px var(--color-primary-light);
}
.search-input::placeholder { color: var(--color-text-muted); }
.filter-chips {
  display: flex;
  gap: var(--space-6);
  flex-wrap: wrap;
  margin-bottom: var(--space-24);
}
.filter-chip {
  padding: var(--space-6) var(--space-12);
  background: var(--color-surface);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-full);
  cursor: pointer;
  font-size: var(--font-size-sm);
  font-weight: 500;
  color: var(--color-text-secondary);
  transition: all 0.2s;
  white-space: nowrap;
  font-family: var(--font-family-base);
}
.filter-chip:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  background: var(--color-primary-light);
}
.filter-chip.active {
  background: var(--color-primary);
  color: white;
  border-color: var(--color-primary);
}
.recipes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--space-16);
}
.recipe-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  padding: var(--space-20);
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  gap: var(--space-8);
}
.recipe-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--color-primary);
}
.recipe-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: var(--space-8);
}
.recipe-title {
  font-size: var(--font-size-base);
  font-weight: 700;
  margin: 0;
  line-height: 1.3;
  color: var(--color-text);
}
.recipe-meta {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
}
.recipe-preview {
  font-size: var(--font-size-sm);
  color: var(--color-text-muted);
  line-height: 1.5;
  flex: 1;
}
.recipe-cta {
  color: var(--color-primary);
  font-weight: 600;
  font-size: var(--font-size-sm);
}

/* RECIPE DETAIL */
.back-bar {
  display: flex;
  gap: var(--space-12);
  margin-bottom: var(--space-20);
  align-items: center;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-6);
  padding: var(--space-8) var(--space-16);
  border-radius: var(--radius-base);
  font-size: var(--font-size-sm);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-family-base);
  border: 1.5px solid transparent;
  line-height: 1.4;
}
.btn-secondary {
  background: var(--color-surface);
  border-color: var(--color-border);
  color: var(--color-text);
}
.btn-secondary:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
}
.btn-primary {
  background: var(--color-primary);
  color: white;
  border-color: var(--color-primary);
}
.btn-primary:hover { background: var(--color-primary-hover); }
.recipe-detail-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  padding: var(--space-32);
  box-shadow: var(--shadow-md);
}
.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: var(--space-16);
  margin-bottom: var(--space-20);
  padding-bottom: var(--space-20);
  border-bottom: 1px solid var(--color-border);
}
.detail-title {
  font-size: var(--font-size-3xl);
  font-weight: 800;
  margin: 0;
  letter-spacing: -0.5px;
  line-height: 1.2;
}
.detail-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-12);
  margin-bottom: var(--space-24);
  padding: var(--space-16);
  background: var(--color-surface-alt);
  border-radius: var(--radius-lg);
}
.detail-info-label {
  font-size: var(--font-size-xs);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--color-text-muted);
  font-weight: 600;
  display: block;
  margin-bottom: var(--space-2);
}
.detail-info-value {
  font-size: var(--font-size-sm);
  color: var(--color-text);
  font-weight: 500;
}
.detail-notes {
  padding: var(--space-16);
  background: var(--color-primary-light);
  border-left: 3px solid var(--color-primary);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin-bottom: var(--space-24);
  font-size: var(--font-size-base);
  color: var(--color-text);
  line-height: 1.7;
}
.empty-state {
  text-align: center;
  padding: var(--space-48) var(--space-24);
  color: var(--color-text-secondary);
}
    </style>
</head>
<body>
    <div class="header">
        <span class="header-emoji">🥗</span>
        <h1>Piano Nutrizionale</h1>
        <h2>Eric &amp; Chiara</h2>
        <div class="theme-switcher">
            <button id="theme-toggle">🌙</button>
        </div>
    </div>

        let currentDay = 'lunedi';
        let currentPerson = 'eric';
        let currentView = 'daily';

        const giorni = ['lunedi','martedi','mercoledi','giovedi','venerdi','sabato','domenica'];
        const giorniLabel = ['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];

        function init() {
            renderDaySelector();
            renderMeals();
        }

        function renderDaySelector() {
            const html = giorni.map((g,i) => 
                `<button class="day-btn ${g===currentDay?'active':''}" onclick="selectDay('${g}')">${giorniLabel[i]}</button>`
            ).join('');
            document.getElementById('daySelector').innerHTML = html;
        }

        function selectDay(day) {
            currentDay = day;
            renderDaySelector();
            renderMeals();
        }



        function renderMeals() {
            const dayData = data[currentDay];
            const mealIcons = { colazione: '☀️', pranzo: '🥗', cena: '🌙' };
            const mealLabels = { colazione: 'Colazione', pranzo: 'Pranzo', cena: 'Cena' };
            const html = ['colazione','pranzo','cena'].map(tipo => {
                const meal = dayData[tipo];
                const badgeHtml = meal.badge ? `<div class="badge badge-warning">${meal.badge}</div>` : '';
                const headerHtml = `<div class="meal-header"><span class="meal-icon">${mealIcons[tipo]}</span><h3 class="meal-title">${mealLabels[tipo]}</h3></div>`;
                const notaHtml = meal.nota ? `<div class="meal-nota">${meal.nota}</div>` : '';

                if (meal.eric && meal.chiara) {
                    return `
                        <div class="meal-card ${tipo}">
                            ${headerHtml}
                            <div class="meal-name">${meal.nome}</div>
                            ${badgeHtml}
                            ${notaHtml}
                            <div class="two-column-layout">
                                <div class="person-card eric">
                                    <div class="person-name">Eric</div>
                                    ${meal.eric.titolo ? `<div class="meal-subtitle">${meal.eric.titolo}</div>` : ''}
                                    <div class="section-title">Ingredienti</div>
                                    <ul>${meal.eric.ingredienti.map(i => `<li>${i}</li>`).join('')}</ul>
                                </div>
                                <div class="person-card chiara">
                                    <div class="person-name">Chiara</div>
                                    ${meal.chiara.titolo ? `<div class="meal-subtitle">${meal.chiara.titolo}</div>` : ''}
                                    <div class="section-title">Ingredienti</div>
                                    <ul>${meal.chiara.ingredienti.map(i => `<li>${i}</li>`).join('')}</ul>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    const personData = currentPerson === 'eric' ? meal.eric : meal.chiara;
                    return `
                        <div class="meal-card ${tipo}">
                            ${headerHtml}
                            <div class="meal-name">${meal.nome}</div>
                            ${badgeHtml}
                            ${notaHtml}
                            <div class="section-title">Ingredienti</div>
                            <ul>${personData.ingredienti.map(i => `<li>${i}</li>`).join('')}</ul>
                        </div>
                    `;
                }
            }).join('');
            document.getElementById('mealsGrid').innerHTML = html;
        }

        function showView(view) {
            currentView = view;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('dailyView').classList.toggle('hidden', view !== 'daily');
            document.getElementById('tableView').classList.toggle('hidden', view !== 'table');
            document.getElementById('recipesView').classList.toggle('hidden', view !== 'recipes');

            if (view === 'table') renderTable();
            if (view === 'recipes') renderRecipes();
        }

        function renderTable() {
            let html = '<table><thead><tr><th>Giorno</th><th>Persona</th><th>Colazione</th><th>Pranzo</th><th>Cena</th></tr></thead><tbody>';
            
            giorni.forEach((g,i) => {
                ['eric','chiara'].forEach((p,j) => {
                    const dayData = data[g];
                    html += `<tr>${j===0?`<td rowspan="2"><strong>${giorniLabel[i]}</strong></td>`:''}`;
                    html += `<td><strong>${p.toUpperCase()}</strong></td>`;
                    
                    // Colazione
                    const colazione = dayData.colazione;
                    const colazioneData = colazione[p];
                    const colazioneTitolo = colazioneData.titolo || colazione.nome;
                    html += `<td><strong>${colazioneTitolo}</strong><br><small>${colazioneData.ingredienti.slice(0,2).join(', ')}...</small></td>`;
                    
                    // Pranzo
                    const pranzo = dayData.pranzo;
                    const pranzoData = pranzo[p];
                    const pranzoBadge = pranzo.badge ? ` <span class="table-badge">${pranzo.badge}</span>` : '';
                    html += `<td><strong>${pranzo.nome}</strong>${pranzoBadge}<br><small>${pranzoData.ingredienti.slice(0,2).join(', ')}...</small></td>`;
                    
                    // Cena
                    const cena = dayData.cena;
                    const cenaData = cena[p];
                    const cenaBadge = cena.badge ? ` <span class="table-badge">${cena.badge}</span>` : '';
                    html += `<td><strong>${cena.nome}</strong>${cenaBadge}<br><small>${cenaData.ingredienti.slice(0,2).join(', ')}...</small></td>`;
                    
                    html += '</tr>';
                });
            });
            
            html += '</tbody></table>';
            document.getElementById('weeklyTable').innerHTML = html;
        }

        let currentCategory = 'tutte';
        let searchQuery = '';
        let selectedRecipe = null;
        let currentSeason = 'estate';

        function renderRecipes() {
            if (selectedRecipe) {
                renderRecipeDetail();
                return;
            }

            const html = `
                <div style="margin-bottom: var(--space-24);">
                    <div class="season-tabs">
                        <button class="season-tab ${currentSeason === 'estate' ? 'active' : ''}" onclick="filterSeason('estate')">☀️ Estate</button>
                        <button class="season-tab ${currentSeason === 'inverno' ? 'active' : ''}" onclick="filterSeason('inverno')">❄️ Inverno</button>
                    </div>
                    <div class="search-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInput" class="search-input" placeholder="Cerca ricetta per nome..."
                               onkeyup="handleSearch(event)">
                    </div>
                    <div class="filter-chips">
                        <button class="filter-chip ${currentCategory==='tutte'?'active':''}" onclick="filterCategory('tutte')">Tutte</button>
                        <button class="filter-chip ${currentCategory==='colazioni_dolci'?'active':''}" onclick="filterCategory('colazioni_dolci')">Colazioni Dolci</button>
                        <button class="filter-chip ${currentCategory==='colazioni_salate'?'active':''}" onclick="filterCategory('colazioni_salate')">Colazioni Salate</button>
                        <button class="filter-chip ${currentCategory==='piatti_unici'?'active':''}" onclick="filterCategory('piatti_unici')">Piatti Unici</button>
                        <button class="filter-chip ${currentCategory==='piatti_estivi'?'active':''}" onclick="filterCategory('piatti_estivi')">Piatti Estivi</button>
                        <button class="filter-chip ${currentCategory==='legumi'?'active':''}" onclick="filterCategory('legumi')">Legumi</button>
                        <button class="filter-chip ${currentCategory==='secondi'?'active':''}" onclick="filterCategory('secondi')">Secondi Proteici</button>
                        <button class="filter-chip ${currentCategory==='contorni'?'active':''}" onclick="filterCategory('contorni')">Contorni</button>
                    </div>
                </div>

                <div id="recipesContainer"></div>
            `;
            document.getElementById('recipesList').innerHTML = html;
            renderRecipesList();
        }

        function showRecipeDetail(categoria, titolo) {
            const unescapedTitle = titolo.replace(/&apos;/g, "'");
            const foundRecipe = ricette[categoria].find(r => r.titolo === unescapedTitle);
            if (foundRecipe) {
                selectedRecipe = {...foundRecipe, categoria: categoria};
                renderRecipeDetail();
            }
        }

        function renderRecipesList() {
            let allRecipes = [];
            
            if (currentCategory === 'tutte') {
                Object.keys(ricette).forEach(cat => {
                    ricette[cat].forEach(r => {
                        if (r.stagione === 'tutto' || r.stagione === currentSeason) {
                            allRecipes.push({...r, categoria: cat});
                        }
                    });
                });
            } else {
                allRecipes = ricette[currentCategory].map(r => ({...r, categoria: currentCategory})).filter(r => r.stagione === 'tutto' || r.stagione === currentSeason);
            }

            if (searchQuery) {
                allRecipes = allRecipes.filter(r => 
                    r.titolo.toLowerCase().includes(searchQuery.toLowerCase())
                );
            }

            const categoryLabels = {
                colazioni_dolci: 'Colazioni Dolci',
                colazioni_salate: 'Colazioni Salate',
                piatti_unici: 'Piatti Unici',
                piatti_estivi: 'Piatti Estivi',
                legumi: 'Legumi',
                secondi: 'Secondi Proteici',
                contorni: 'Contorni'
            };

            const cards = allRecipes.map(r => {
                const escapedTitle = r.titolo.replace(/'/g, "&apos;");
                return `
                <div class="recipe-card" onclick="showRecipeDetail('${r.categoria}', '${escapedTitle}')">
                    <div class="recipe-card-header">
                        <div class="recipe-title">${r.titolo}</div>
                        <div class="badge ${r.fonte==='nutrizionista'?'badge-success':'badge-warning'}">
                            ${r.fonte==='nutrizionista'?'Nutriz.':'Creativa'}
                        </div>
                    </div>
                    <div class="recipe-meta">${categoryLabels[r.categoria]} · ⏱ ${r.tempo}</div>
                    <div class="recipe-preview">${r.ingredienti.slice(0, 3).join(', ')}${r.ingredienti.length > 3 ? '...' : ''}</div>
                    <div class="recipe-cta">Vedi ricetta →</div>
                </div>
            `;
            }).join('');

            const html = cards
                ? `<div class="recipes-grid">${cards}</div>`
                : '<p class="empty-state">Nessuna ricetta trovata.</p>';

            const container = document.getElementById('recipesContainer');
            if (container) container.innerHTML = html;
        }

        function filterCategory(cat) {
            currentCategory = cat;
            searchQuery = '';
            renderRecipes();
        }

        function handleSearch(event) {
            searchQuery = event.target.value;
            renderRecipesList();
        }

        function filterSeason(season) {
            currentSeason = season;
            localStorage.setItem('season', season);
            renderRecipes();
        }

                colazioni_dolci: 'Colazioni Dolci',

                legumi: 'Legumi',
                secondi: 'Secondi Proteici',
                contorni: 'Contorni'

            const badgeClass = selectedRecipe.fonte === 'nutrizionista' ? 'badge-success' : 'badge-warning';
            const badgeText = selectedRecipe.fonte === 'nutrizionista' ? 'Dal Nutrizionista' : 'Creativa';

            let html = `
                <div class="back-bar">

                        <div>
                            <span class="detail-info-label">Tempo di preparazione</span>
                            <span class="detail-info-value">⏱ ${selectedRecipe.tempo}</span>
                        </div>
                    </div>
                    <div class="section-title">Ingredienti</div>
                    <ul style="margin-bottom: var(--space-24);">
                        ${selectedRecipe.ingredienti.map(i => `<li>${i}</li>`).join('')}
                    </ul>
                    <div class="section-title">Preparazione</div>
                    <p style="line-height: 1.8; margin-bottom: var(--space-24);">${selectedRecipe.preparazione}</p>
            `;

            if (selectedRecipe.note) {
                html += `
                    <div class="section-title">Note &amp; Consigli</div>
                    <div class="detail-notes">${selectedRecipe.note}</div>
                `;
            }

            if (selectedRecipe.varianti && selectedRecipe.varianti.length > 0) {
                html += `
                    <div class="section-title">Varianti</div>
                    <ul>${selectedRecipe.varianti.map(v => `<li>${v}</li>`).join('')}</ul>
                `;
            }

            html += '</div>';
            document.getElementById('recipesList').innerHTML = html;
        }

        function closeRecipeDetail() {
            selectedRecipe = null;
            renderRecipes();
        }

        function printRecipe() {
            const printContent = document.getElementById('printableRecipe').innerHTML;
            const printWindow = window.open('', '', 'width=800,height=600');
            if (!printWindow) {
                alert('Impossibile aprire la finestra di stampa. Controlla le impostazioni del browser.');
                return;
            }
            printWindow.document.write('<html><head><title>Stampa Ricetta - ' + selectedRecipe.titolo + '</title>');
            printWindow.document.write('<style>');
            printWindow.document.write('body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }');
            printWindow.document.write('h2 { color: #134252; }');
            printWindow.document.write('ul { margin: 10px 0; padding-left: 20px; }');
            printWindow.document.write('li { margin-bottom: 8px; }');
            printWindow.document.write('.section-title { font-weight: bold; font-size: 14px; margin-top: 20px; margin-bottom: 10px; text-transform: uppercase; }');
            printWindow.document.write('.badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; }');
            printWindow.document.write('.badge-success { background: rgba(34, 197, 94, 0.2); }');
            printWindow.document.write('.badge-warning { background: rgba(245, 158, 11, 0.2); }');
            printWindow.document.write('</style></head><body>');
            printWindow.document.write(printContent);
            printWindow.document.write('</body></html>');
            printWindow.document.close();
            setTimeout(function() {
                printWindow.print();
            }, 250);
        }


        function setTheme(theme) {
            document.body.className = theme;
            localStorage.setItem('theme', theme);
            const themeToggle = document.getElementById('theme-toggle');
            if (theme === 'dark-theme') {
                themeToggle.textContent = '☀️';
            } else {
                themeToggle.textContent = '🌙';
            }
        }

        function toggleTheme() {
            const currentTheme = localStorage.getItem('theme') || 'light-theme';
            const newTheme = currentTheme === 'light-theme' ? 'dark-theme' : 'light-theme';
            setTheme(newTheme);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light-theme';
            const savedSeason = localStorage.getItem('season') || 'estate';
            
            setTheme(savedTheme);
            currentSeason = savedSeason;
            
            const themeToggle = document.getElementById('theme-toggle');
            themeToggle.addEventListener('click', toggleTheme);

            init();
        });

        function init() {
            renderDaySelector();
            renderMeals();
            renderRecipes();
        }
    </script>
</body>
</html>
